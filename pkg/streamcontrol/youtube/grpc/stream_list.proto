syntax = "proto3";
package youtube.api.v3;
option go_package = "github.com/xaionaro-go/streamctl/pkg/streamcontrol/youtube/grpc/ytgrpc;ytgrpc";

service V3DataLiveChatMessageService {
  rpc StreamList(LiveChatMessageListRequest)
      returns (stream LiveChatMessageListResponse) {}
}

message LiveChatMessageListRequest {
  string live_chat_id = 1;
  string hl = 2;
  uint32 profile_image_size = 3;
  uint32 max_results = 98;
  string page_token = 99;
  repeated string part = 100;
}

message LiveChatMessageListResponse {
  string offline_at = 2;
  string kind = 200;
  string etag = 201;
  PageInfo page_info = 1004;
  string next_page_token = 100602;
  repeated LiveChatMessage items = 1007;
  LiveChatMessage active_poll_item = 1008;
}

message LiveChatMessage {
  string id = 101;
  LiveChatMessageSnippet snippet = 2;
  LiveChatMessageAuthorDetails author_details = 3;
  string kind = 200;
  string etag = 201;
}

message LiveChatMessageAuthorDetails {
  bool is_verified = 4;
  bool is_chat_owner = 5;
  bool is_chat_sponsor = 6;
  bool is_chat_moderator = 7;
  string channel_url = 102;
  string display_name = 103;
  string profile_image_url = 104;
  string channel_id = 10101;
}

message LiveChatMessageSnippet {
  enum Type {
    INVALID_TYPE = 0;
    TEXT_MESSAGE_EVENT = 1;
    TOMBSTONE = 2;
    FAN_FUNDING_EVENT = 3;
    CHAT_ENDED_EVENT = 4;
    SPONSOR_ONLY_MODE_STARTED_EVENT = 5;
    SPONSOR_ONLY_MODE_ENDED_EVENT = 6;
    NEW_SPONSOR_EVENT = 7;
    MESSAGE_DELETED_EVENT = 8;
    MESSAGE_RETRACTED_EVENT = 9;
    USER_BANNED_EVENT = 10;
    SUPER_CHAT_EVENT = 15;
    SUPER_STICKER_EVENT = 16;
    MEMBER_MILESTONE_CHAT_EVENT = 17;
    MEMBERSHIP_GIFTING_EVENT = 18;
    GIFT_MEMBERSHIP_RECEIVED_EVENT = 19;
    POLL_EVENT = 20;
  }

  Type type = 1;
  string published_at = 4;
  string display_message = 16;
  bool has_display_content = 17;
  oneof displayed_content {
    LiveChatTextMessageDetails text_message_details = 19;
    LiveChatMessageDeletedDetails message_deleted_details = 20;
    LiveChatMessageRetractedDetails message_retracted_details = 21;
    LiveChatUserBannedMessageDetails user_banned_details = 22;
    LiveChatSuperChatDetails super_chat_details = 27;
    LiveChatSuperStickerDetails super_sticker_details = 28;
    LiveChatNewSponsorDetails new_sponsor_details = 29;
    LiveChatMemberMilestoneChatDetails member_milestone_chat_details = 30;
    LiveChatMembershipGiftingDetails membership_gifting_details = 31;
    LiveChatGiftMembershipReceivedDetails gift_membership_received_details = 32;
    LiveChatPollDetails poll_details = 33;
  }
  string live_chat_id = 201;
  string author_channel_id = 301;
}

message LiveChatTextMessageDetails {
  string message_text = 1;
}

message LiveChatMessageDeletedDetails {
  string deleted_message_id = 101;
}

message LiveChatMessageRetractedDetails {
  string retracted_message_id = 201;
}

message LiveChatUserBannedMessageDetails {
  enum BanType {
    BAN_TYPE_UNSPECIFIED = 0;
    PERMANENT = 1;
    TEMPORARY = 2;
  }

  ChannelProfileDetails banned_user_details = 1;
  BanType ban_type = 2;
  uint64 ban_duration_seconds = 4;
}

message LiveChatSuperChatDetails {
  uint64 amount_micros = 1;
  string currency = 2;
  string amount_display_string = 3;
  string user_comment = 4;
  uint32 tier = 5;
}

message LiveChatSuperStickerDetails {
  uint64 amount_micros = 1;
  string currency = 2;
  string amount_display_string = 3;
  uint32 tier = 4;
  SuperStickerMetadata super_sticker_metadata = 5;
}

message LiveChatNewSponsorDetails {
  string member_level_name = 1;
  bool is_upgrade = 2;
}

message LiveChatMemberMilestoneChatDetails {
  string member_level_name = 1;
  uint32 member_month = 2;
  string user_comment = 3;
}

message LiveChatMembershipGiftingDetails {
  int32 gift_memberships_count = 1;
  string gift_memberships_level_name = 2;
}

message LiveChatGiftMembershipReceivedDetails {
  string member_level_name = 1;
  string gifter_channel_id = 2;
  string associated_membership_gifting_message_id = 3;
}

message LiveChatPollDetails {
  message PollMetadata {
    message PollOption {
      string option_text = 1;
      int64 tally = 2;
    }
    string question_text = 1;
    repeated PollOption options = 2;
  }

  enum PollStatus {
    POLL_STATUS_UNKNOWN = 0;
    ACTIVE = 1;
    CLOSED = 2;
  }

  PollMetadata metadata = 1;
  PollStatus status = 2;
}

message SuperStickerMetadata {
  string sticker_id = 1;
  string alt_text = 2;
  string alt_text_language = 3;
}

message ChannelProfileDetails {
  string channel_id = 101;
  string channel_url = 2;
  string display_name = 3;
  string profile_image_url = 4;
}

message PageInfo {
  int32 total_results = 1;
  int32 results_per_page = 2;
}
